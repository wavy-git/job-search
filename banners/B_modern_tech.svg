<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="55%" stop-color="#2E3A8C"/>
      <stop offset="100%" stop-color="#0EA5A5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- geometric shapes LEFT (away from text, but photo will cover lower portion) -->
  <g opacity="0.7">
    <polygon points="160,40 320,20 400,160 240,200" fill="none" stroke="#5EEAD4" stroke-width="1.5"/>
    <circle cx="380" cy="90" r="38" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="180" cy="140" r="14" fill="#5EEAD4" fill-opacity="0.45"/>
  </g>

  <!-- subtle horizontal accent right -->
  <g stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1">
    <line x1="780" y1="80" x2="1500" y2="80"/>
    <line x1="780" y1="320" x2="1500" y2="320"/>
  </g>

  <!-- text RIGHT side -->
  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" fill="#FFFFFF">
    <text x="780" y="170" font-size="44" font-weight="700" letter-spacing="-0.5">Technology Leader</text>
    <text x="780" y="215" font-size="22" font-weight="500" fill="#5EEAD4" letter-spacing="2">AI-Augmented Ops  /  Regulated Platforms</text>
    <text x="780" y="270" font-size="20" fill="#E2E8F0" font-weight="300">Building what doesn't exist yet,</text>
    <text x="780" y="298" font-size="20" fill="#E2E8F0" font-weight="300">and solving problems others miss.</text>
  </g>
</svg>
