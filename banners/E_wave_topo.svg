  <!-- dark scrim behind text for legibility -->
  <rect x="740" y="120" width="800" height="180" fill="#0B1426" fill-opacity="0.55"/>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#FFFFFF">
    <text x="780" y="180" font-size="40" font-weight="600">Technology Leader</text>
    <text x="780" y="215" font-size="18" fill="#7DD3FC" letter-spacing="3" font-family="Helvetica, Arial, sans-serif">AI-AUGMENTED OPS  ·  REGULATED PLATFORMS</text>
    <text x="780" y="258" font-size="18" fill="#D1D5DB" font-family="Helvetica, Arial, sans-serif" font-style="italic">Building what doesn't exist yet,</text>
    <text x="780" y="282" font-size="18" fill="#D1D5DB" font-family="Helvetica, Arial, sans-serif" font-style="italic">and solving problems others miss.</text>
  </g>
</svg>
