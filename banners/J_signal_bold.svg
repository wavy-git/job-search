<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- ghost background waves -->
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1">
    <path d="M0,140 Q396,80 792,140 T1584,140"/>
    <path d="M0,170 Q396,110 792,170 T1584,170"/>
    <path d="M0,260 Q396,320 792,260 T1584,260"/>
    <path d="M0,290 Q396,350 792,290 T1584,290"/>
  </g>

  <!-- prominent single signal wave -->
  <path d="M0,210 Q396,140 792,210 T1584,210" fill="none" stroke="url(#signal)" stroke-width="2.5"/>

  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" fill="#FFFFFF">
    <text x="780" y="180" font-size="42" font-weight="700" letter-spacing="-0.5">Technology Leader</text>
    <text x="780" y="218" font-size="19" font-weight="500" fill="#22D3EE" letter-spacing="2.5">AI-AUGMENTED OPS  ·  REGULATED PLATFORMS</text>
    <text x="780" y="270" font-size="19" fill="#CBD5E1" font-weight="300">Building what doesn't exist yet,</text>
    <text x="780" y="296" font-size="19" fill="#CBD5E1" font-weight="300">and solving problems others miss.</text>
  </g>
</svg>
