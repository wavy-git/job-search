<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0"/>
      <stop offset="40%" stop-color="#5EEAD4" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- background ghost waves -->
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1">
    <path d="M0,120 Q396,40 792,120 T1584,120"/>
    <path d="M0,160 Q396,80 792,160 T1584,160"/>
    <path d="M0,280 Q396,360 792,280 T1584,280"/>
    <path d="M0,320 Q396,400 792,320 T1584,320"/>
  </g>

  <!-- prominent signal wave with gradient -->
  <path d="M0,210 Q300,140 600,210 T1200,210 T1800,210" fill="none" stroke="url(#wave)" stroke-width="2.5"/>
  <path d="M0,210 Q300,280 600,210 T1200,210 T1800,210" fill="none" stroke="url(#wave)" stroke-width="1.5" stroke-opacity="0.5"/>

  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" fill="#FFFFFF">
    <text x="780" y="180" font-size="42" font-weight="700" letter-spacing="-0.5">Technology Leader</text>
    <text x="780" y="218" font-size="19" font-weight="500" fill="#5EEAD4" letter-spacing="2.5">AI-AUGMENTED OPS  ·  REGULATED PLATFORMS</text>
    <text x="780" y="270" font-size="19" fill="#CBD5E1" font-weight="300">Building what doesn't exist yet,</text>
    <text x="780" y="296" font-size="19" fill="#CBD5E1" font-weight="300">and solving problems others miss.</text>
  </g>
</svg>
