<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1426"/>
      <stop offset="100%" stop-color="#1A2F52"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- layered wave lines across full width -->
  <g fill="none" stroke="#5EEAD4" stroke-width="1.2">
    <path d="M0,150 C200,110 400,190 600,150 S1000,110 1200,150 1500,170 1584,150" stroke-opacity="0.35"/>
    <path d="M0,180 C200,140 400,220 600,180 S1000,140 1200,180 1500,200 1584,180" stroke-opacity="0.25"/>
    <path d="M0,210 C200,170 400,250 600,210 S1000,170 1200,210 1500,230 1584,210" stroke-opacity="0.18"/>
    <path d="M0,240 C200,200 400,280 600,240 S1000,200 1200,240 1500,260 1584,240" stroke-opacity="0.12"/>
    <path d="M0,270 C200,230 400,310 600,270 S1000,230 1200,270 1500,290 1584,270" stroke-opacity="0.08"/>
  </g>

  <!-- accent line under headline -->
  <line x1="780" y1="232" x2="900" y2="232" stroke="#5EEAD4" stroke-width="2"/>

  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" fill="#FFFFFF">
    <text x="780" y="180" font-size="42" font-weight="700" letter-spacing="-0.5">Technology Leader</text>
    <text x="780" y="218" font-size="20" font-weight="500" fill="#5EEAD4" letter-spacing="2.5">AI-AUGMENTED OPS  ·  REGULATED PLATFORMS</text>
    <text x="780" y="270" font-size="19" fill="#C8D1E0" font-weight="300">Building what doesn't exist yet,</text>
    <text x="780" y="296" font-size="19" fill="#C8D1E0" font-weight="300">and solving problems others miss.</text>
  </g>
</svg>
